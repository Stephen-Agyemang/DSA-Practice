name: Sync LeetCode to GitHub

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate LeetCode credentials
        id: auth-check
        env:
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
        run: |
          response="$(curl -sS 'https://leetcode.com/graphql/' \
            -H 'content-type: application/json' \
            -H "cookie: csrftoken=${LEETCODE_CSRF_TOKEN}; LEETCODE_SESSION=${LEETCODE_SESSION};" \
            -H "x-csrftoken: ${LEETCODE_CSRF_TOKEN}" \
            --data '{"query":"query ($offset: Int!, $limit: Int!, $slug: String) { submissionList(offset: $offset, limit: $limit, questionSlug: $slug) { submissions { id } } }","variables":{"offset":0,"limit":1,"slug":null}}')"

          if echo "$response" | jq -e '.data.submissionList.submissions | type == "array"' >/dev/null; then
            echo "auth_valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::LeetCode auth is invalid or expired. Refresh LEETCODE_SESSION and LEETCODE_CSRF_TOKEN repository secrets."
            echo "auth_valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync
        if: steps.auth-check.outputs.auth_valid == 'true'
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          filter-duplicate-secs: 86400 # Prevents duplicate commits on same day
